name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Commit: $GIT_COMMIT"
          echo "Build Time: $BUILD_TIME"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to Production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 31.97.102.48 >> ~/.ssh/known_hosts

          echo "Deploying go-draw to Production..."

          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << ENDSSH
            set -ex
            cd /home/ubuntu/go-draw/source
            git fetch origin
            git reset --hard "$COMMIT_SHA"
            cd ..

            export VERSION="$VERSION"
            export GIT_COMMIT="$GIT_COMMIT"
            export BUILD_TIME="$BUILD_TIME"

            # Login to Docker Hub (rate limiting mitigation)
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            # Build new images while old containers are still running
            docker compose -f source/docker-compose.yml -p godraw build \
              --build-arg VERSION="$VERSION" \
              --build-arg GIT_COMMIT="$GIT_COMMIT" \
              --build-arg BUILD_TIME="$BUILD_TIME"

            # Recreate containers with new images
            docker compose -f source/docker-compose.yml -p godraw up -d --force-recreate --remove-orphans

            # Clean up old images
            docker image prune -f || true

            sleep 5
            docker compose -f source/docker-compose.yml -p godraw ps
          ENDSSH

      - name: Capture container logs on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << 'ENDSSH'
            cd /home/ubuntu/go-draw
            docker compose -f source/docker-compose.yml -p godraw ps -a
            docker compose -f source/docker-compose.yml -p godraw logs --tail=100 godraw
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          # Health check (direct, not behind Cloudflare Access)
          curl -f https://draw.biswas.me/health || exit 1
          echo "Production deployed successfully"

      - name: Deployment summary
        run: |
          echo "## go-draw Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 31.97.102.48" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://draw.biswas.me" >> $GITHUB_STEP_SUMMARY
