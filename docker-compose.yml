services:
  godraw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-dev}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    container_name: godraw
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - DATA_DIR=/data/drawings
      - UPLOAD_DIR=/data/uploads
    volumes:
      - godraw-data:/data
    networks:
      - godraw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  godraw-data:
    driver: local

networks:
  godraw:
    driver: bridge
