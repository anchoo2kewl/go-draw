<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- pencil body -->
  <g transform="translate(16,16) rotate(-45) translate(-16,-16)">
    <rect x="13" y="6" width="6" height="16" rx="1" fill="#fbbf24"/>
    <rect x="13" y="6" width="6" height="3" rx="1" fill="#f59e0b"/>
    <!-- eraser -->
    <rect x="13" y="4" width="6" height="3" rx="1.5" fill="#fb7185"/>
    <!-- tip -->
    <polygon points="13,22 19,22 16,27" fill="#1e1e2e"/>
  </g>
  <!-- small sparkle -->
  <circle cx="9" cy="9" r="1.5" fill="white" opacity=".7"/>
  <circle cx="24" cy="25" r="1" fill="white" opacity=".5"/>
</svg>
